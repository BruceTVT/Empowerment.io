<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>H&H 2026 Empowerment Week · Schedule</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --primary-dark: #5b21b6;
            --primary-glow: rgba(124, 58, 237, 0.25);
            --bg-start: #f5f3ff;
            --bg-end: #ede9fe;
            --card-bg: rgba(255, 255, 255, 0.78);
            --card-border: rgba(255, 255, 255, 0.4);
            --text-dark: #1e1b4b;
            --text-muted: #4b5563;
            --text-en: #6b7280;
            --shadow: 0 8px 32px rgba(124, 58, 237, 0.15);
            --radius: 24px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            background: #0b0719;
        }

        /* ===== 背景主视觉 ===== */
        .kv-sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg,
                    #0b1a33 0%,
                    #1a2a5e 20%,
                    #3d2a6b 40%,
                    #6b2f6b 55%,
                    #9e3a6b 70%,
                    #c4546a 85%,
                    #d97a6a 100%);
            pointer-events: none;
        }
        .cloud-wash {
            position: fixed;
            z-index: 0;
            pointer-events: none;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            mix-blend-mode: screen;
            will-change: transform;
        }
        .cw-1 {
            width: 700px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(168, 85, 247, 0.5), transparent 70%);
            top: 5%;
            left: -10%;
            animation: driftCloud 28s ease-in-out infinite alternate;
        }
        .cw-2 {
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(236, 72, 153, 0.45), transparent 70%);
            bottom: 10%;
            right: -15%;
            animation: driftCloud 32s ease-in-out infinite alternate-reverse;
        }
        .cw-3 {
            width: 500px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(59, 130, 246, 0.35), transparent 70%);
            top: 40%;
            left: 40%;
            animation: driftCloud 24s ease-in-out infinite alternate;
        }
        .cw-4 {
            width: 600px;
            height: 350px;
            background: radial-gradient(ellipse, rgba(236, 72, 153, 0.3), rgba(168, 85, 247, 0.2), transparent 70%);
            top: 60%;
            left: 20%;
            animation: driftCloud 30s ease-in-out infinite alternate-reverse;
        }
        @keyframes driftCloud {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, -40px) scale(1.2); }
        }

        .road-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            perspective: 800px;
            perspective-origin: 50% 100%;
        }
        .road-surface {
            position: absolute;
            bottom: 0;
            left: -10%;
            width: 120%;
            height: 100%;
            background: linear-gradient(180deg,
                    transparent 0%,
                    rgba(11, 7, 25, 0.3) 30%,
                    rgba(11, 7, 25, 0.6) 70%,
                    rgba(11, 7, 25, 0.9) 100%);
            transform: rotateX(12deg) scaleY(1.2);
            transform-origin: bottom center;
            border-radius: 0 0 50% 50% / 0 0 30% 30%;
            box-shadow: 0 -60px 120px rgba(124, 58, 237, 0.08);
        }
        .track-line {
            position: absolute;
            bottom: 0;
            height: 100%;
            width: 2px;
            transform-origin: bottom center;
            transform: rotateX(12deg) scaleY(1.4);
            opacity: 0.6;
            border-radius: 2px;
        }
        .track-line::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 60%;
            background: inherit;
            filter: blur(20px);
            opacity: 0.5;
        }
        .track-blue {
            left: 15%;
            background: linear-gradient(to top, rgba(56, 189, 248, 0.9), rgba(56, 189, 248, 0.1));
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
            animation: trackPulseBlue 3s ease-in-out infinite alternate;
        }
        .track-blue-2 {
            left: 22%;
            background: linear-gradient(to top, rgba(56, 189, 248, 0.6), rgba(56, 189, 248, 0.05));
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
            animation: trackPulseBlue 4s ease-in-out infinite alternate-reverse;
        }
        .track-blue-3 {
            left: 8%;
            background: linear-gradient(to top, rgba(56, 189, 248, 0.4), transparent);
            animation: trackPulseBlue 3.5s ease-in-out infinite alternate;
        }
        .track-orange {
            right: 15%;
            background: linear-gradient(to top, rgba(251, 146, 60, 0.9), rgba(251, 146, 60, 0.1));
            box-shadow: 0 0 30px rgba(251, 146, 60, 0.3);
            animation: trackPulseOrange 3.2s ease-in-out infinite alternate;
        }
        .track-orange-2 {
            right: 22%;
            background: linear-gradient(to top, rgba(251, 146, 60, 0.6), rgba(251, 146, 60, 0.05));
            box-shadow: 0 0 20px rgba(251, 146, 60, 0.15);
            animation: trackPulseOrange 4.2s ease-in-out infinite alternate-reverse;
        }
        .track-orange-3 {
            right: 8%;
            background: linear-gradient(to top, rgba(251, 146, 60, 0.4), transparent);
            animation: trackPulseOrange 3.8s ease-in-out infinite alternate;
        }
        @keyframes trackPulseBlue {
            0% { opacity: 0.4; filter: brightness(0.8); }
            100% { opacity: 0.9; filter: brightness(1.4); }
        }
        @keyframes trackPulseOrange {
            0% { opacity: 0.4; filter: brightness(0.8); }
            100% { opacity: 0.9; filter: brightness(1.4); }
        }

        .flow-line {
            position: absolute;
            bottom: 0;
            height: 80%;
            border-radius: 4px;
            transform-origin: bottom center;
            transform: rotateX(12deg) scaleY(1.3);
            filter: blur(6px);
            opacity: 0.35;
        }
        .flow-blue {
            left: 18%;
            width: 8px;
            background: linear-gradient(to top, #38bdf8, rgba(56, 189, 248, 0.2));
            animation: flowMoveBlue 4s ease-in-out infinite alternate;
        }
        .flow-orange {
            right: 18%;
            width: 8px;
            background: linear-gradient(to top, #fb923c, rgba(251, 146, 60, 0.2));
            animation: flowMoveOrange 4s ease-in-out infinite alternate;
        }
        @keyframes flowMoveBlue {
            0% { transform: rotateX(12deg) scaleY(1.3) translateX(-20px); opacity: 0.2; }
            100% { transform: rotateX(12deg) scaleY(1.5) translateX(20px); opacity: 0.5; }
        }
        @keyframes flowMoveOrange {
            0% { transform: rotateX(12deg) scaleY(1.3) translateX(20px); opacity: 0.2; }
            100% { transform: rotateX(12deg) scaleY(1.5) translateX(-20px); opacity: 0.5; }
        }

        .bokeh {
            position: fixed;
            z-index: 0;
            pointer-events: none;
            border-radius: 50%;
            filter: blur(30px);
            opacity: 0.15;
            mix-blend-mode: screen;
        }
        .bokeh-1 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.3), transparent 70%);
            top: 15%; left: 10%;
            animation: floatBokeh 20s ease-in-out infinite alternate;
        }
        .bokeh-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(251, 146, 60, 0.25), transparent 70%);
            bottom: 20%; right: 5%;
            animation: floatBokeh 25s ease-in-out infinite alternate-reverse;
        }
        .bokeh-3 {
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(244, 114, 182, 0.2), transparent 70%);
            top: 50%; left: 50%;
            animation: floatBokeh 18s ease-in-out infinite alternate;
        }
        .bokeh-4 {
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.2), transparent 70%);
            top: 30%; right: 20%;
            animation: floatBokeh 22s ease-in-out infinite alternate-reverse;
        }
        @keyframes floatBokeh {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, -40px) scale(1.3); }
        }

        .horizon-glow {
            position: fixed;
            bottom: 30%; left: 50%;
            transform: translateX(-50%);
            width: 80%; height: 35%;
            z-index: 0; pointer-events: none;
            background: radial-gradient(ellipse at center bottom,
                    rgba(251, 146, 60, 0.25) 0%,
                    rgba(251, 146, 60, 0.08) 40%,
                    transparent 70%);
            filter: blur(40px);
            border-radius: 50%;
        }

        /* ===== 内容层 ===== */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 2.5rem;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px) saturate(1.2);
            padding: 1.2rem 2.2rem;
            border-radius: var(--radius);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .logo-text {
            flex: 1;
            min-width: 260px;
        }
        .logo-text h1 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(167, 139, 250, 0.2);
        }
        .logo-text small {
            display: block;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            -webkit-text-fill-color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.3px;
            margin-top: 2px;
        }

        /* 导航选项卡 */
        .nav-tabs {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .nav-tabs button {
            padding: 0.6rem 1.6rem;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
        }
        .nav-tabs button:hover {
            background: rgba(167, 139, 250, 0.25);
            color: #fff;
            border-color: rgba(167, 139, 250, 0.3);
        }
        .nav-tabs button:active {
            transform: scale(0.96);
        }
        .nav-tabs button.active {
            background: rgba(124, 58, 237, 0.6);
            color: #fff;
            box-shadow: 0 4px 24px rgba(124, 58, 237, 0.4);
            border-color: rgba(167, 139, 250, 0.4);
        }

        .day-panel {
            display: none;
            animation: fadeInUp 0.6s ease;
        }
        .day-panel.active { display: block; }

        .venue-block {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px) saturate(1.1);
            border-radius: var(--radius);
            padding: 1.8rem 2rem;
            margin-bottom: 2.2rem;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .venue-block:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 56px rgba(0, 0, 0, 0.3);
        }

        .venue-title-wrap {
            text-align: center;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.6), rgba(91, 33, 182, 0.6));
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            display: inline-block;
            margin-bottom: 1.8rem;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .venue-title-wrap a {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: opacity 0.2s;
        }
        .venue-title-wrap a:hover {
            opacity: 0.85;
            text-decoration: underline;
        }
        .venue-title-wrap a .map-icon {
            font-size: 1.2rem;
        }

        .session-option {
            width: 92%;
            margin: 0 auto 0.6rem auto;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .session-option:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .session-wrapper {
            display: flex;
            gap: 16px;
            align-items: stretch;
        }
        .session-time-column {
            flex: 0 0 120px;
            font-weight: 700;
            color: rgba(167, 139, 250, 0.9);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            padding: 4px 0;
        }
        .session-speaker-column {
            flex: 0 0 160px;
            font-weight: 500;
            color: rgba(244, 114, 182, 0.85);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            padding: 4px 0;
            letter-spacing: 0.3px;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            padding-left: 12px;
            flex-wrap: wrap;
            line-height: 1.4;
        }
        .session-speaker-column .speaker-name {
            display: inline-block;
            margin-right: 4px;
        }
        .session-speaker-column .speaker-sep {
            color: rgba(255, 255, 255, 0.2);
            margin: 0 2px;
        }
        .session-info-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 4px 0;
            justify-content: center;
            padding-left: 12px;
        }
        .session-name {
            font-weight: 600;
            font-size: 1.0rem;
            color: rgba(255, 255, 255, 0.92);
            line-height: 1.4;
        }
        .session-name-en {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            line-height: 1.4;
        }

        .session-option.full-day .session-wrapper {
            background: rgba(167, 139, 250, 0.08);
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            margin: 0 -0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ===== 页脚：与课程卡片同宽 ===== */
        footer {
            margin-top: 3.5rem;
            padding: 2.2rem 0 1.5rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
        }
        footer::before {
            content: '';
            position: absolute;
            top: -1px; left: 15%;
            width: 70%; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(167, 139, 250, 0.3), rgba(244, 114, 182, 0.3), transparent);
            opacity: 0.8;
        }

        .footer-primary {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        /* 参会须知卡片：宽度与上方的 venue-block 保持一致 (100%) */
        .footer-notice-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px) saturate(1.1);
            border-radius: var(--radius);
            padding: 1.8rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .notice-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: rgba(244, 114, 182, 0.95);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 0.4rem;
        }
        .notice-section {
            margin-bottom: 0.2rem;
        }
        .notice-sec-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: rgba(167, 139, 250, 0.95);
            margin-bottom: 0.25rem;
        }
        .notice-list {
            list-style: none;
            padding-left: 0;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.5;
        }
        .notice-list li {
            position: relative;
            padding-left: 12px;
            margin-bottom: 0.25rem;
        }
        .notice-list li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: rgba(244, 114, 182, 0.7);
        }
        .notice-hl {
            color: #ffffff;
            font-weight: 600;
        }

        .footer-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.5px;
            margin-top: 0.4rem;
        }
        .footer-brand .brand-icon {
            font-size: 1rem;
            color: rgba(167, 139, 250, 0.6);
        }
        .footer-brand .brand-dot {
            display: inline-block;
            width: 5px; height: 5px;
            border-radius: 50%;
            background: rgba(167, 139, 250, 0.5);
            animation: pulseDot 2s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .footer-highlight {
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 0.8px;
        }
        .footer-highlight .hl-time {
            color: rgba(167, 139, 250, 0.8);
            font-weight: 500;
        }
        .footer-highlight .hl-sep {
            color: rgba(255, 255, 255, 0.15);
            margin: 0 0.4rem;
        }
        .footer-highlight .hl-location {
            color: rgba(244, 114, 182, 0.7);
            font-weight: 500;
        }

        .footer-logo-group {
            display: inline-flex;
            align-items: center;
            gap: 1.2rem;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(16px);
            padding: 8px 22px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 255, 255, 0.15);
            margin: 0.2rem 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .logo-img {
            height: 36px;
            width: auto;
            object-fit: contain;
            display: block;
            transition: transform 0.25s ease;
            filter: contrast(1.15) brightness(1.02);
        }
        .logo-img:hover {
            transform: scale(1.08);
        }

        .logo-divider {
            width: 1px;
            height: 22px;
            background: rgba(0, 0, 0, 0.18);
        }

        .footer-mini-lines {
            display: flex;
            justify-content: center;
            gap: 0.4rem;
            margin-top: 0.8rem;
        }
        .footer-mini-lines span {
            display: inline-block;
            width: 4px; height: 4px;
            border-radius: 50%;
            background: rgba(167, 139, 250, 0.15);
        }
        .footer-mini-lines span:nth-child(2) { opacity: 0.35; }
        .footer-mini-lines span:nth-child(3) { opacity: 0.55; }
        .footer-mini-lines span:nth-child(4) { opacity: 0.35; }
        .footer-mini-lines span:nth-child(5) { opacity: 0.15; }

        @media (max-width: 768px) {
            .container {
                padding: 1rem 0.8rem 1.5rem;
            }
            header {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 1rem;
                padding: 1.2rem 1rem;
            }
            .logo-text {
                min-width: unset;
                width: 100%;
            }
            .logo-text h1 {
                font-size: 1.35rem;
            }
            
            .nav-tabs {
                width: 100%;
                display: flex;
                justify-content: space-between;
                gap: 0.4rem;
            }
            .nav-tabs button {
                flex: 1;
                padding: 0.6rem 0.4rem;
                font-size: 0.8rem;
                text-align: center;
            }

            .session-option { width: 100%; }
            .session-wrapper { flex-direction: column; gap: 2px; }
            .session-time-column { flex: unset; font-size: 0.8rem; padding-bottom: 0; }
            .session-speaker-column {
                flex: unset;
                font-size: 0.8rem;
                border-left: none;
                padding-left: 0;
                padding-top: 0;
                width: 100%;
            }
            .session-info-column { padding-left: 0; }
            .session-name { font-size: 0.9rem; }
            .session-name-en { font-size: 0.7rem; }
            .venue-block { padding: 1.2rem 1rem; }
            .road-wrapper { height: 40%; }
            .track-line { display: none; }
            .flow-line { display: none; }
            
            .footer-notice-card { padding: 1.2rem 1rem; }
            .footer-highlight { font-size: 0.75rem; letter-spacing: 0.4px; }
            .footer-brand { font-size: 0.8rem; }
            .venue-title-wrap a { font-size: 1rem; }
            
            .footer-logo-group { padding: 6px 14px; gap: 0.6rem; }
            .logo-img { height: 26px; }
            .logo-divider { height: 16px; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- ===== 背景层 ===== -->
    <div class="kv-sky"></div>
    <div class="cloud-wash cw-1"></div>

    <script>
        (function() {
            // ==========================================
            // 1. Canvas 粒子与星空渲染引擎 (高性能版)
            // ==========================================
            const canvas = document.getElementById('canvas-bg');
            const ctx = canvas.getContext('2d');
            let width, height;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            // 星星数据
            const stars = [];
            const STAR_COUNT = 120;
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height * 0.7,
                    baseRadius: Math.random() * 1.5 + 0.5,
                    phase: Math.random() * Math.PI * 2,
                    speed: (Math.random() * 0.03) + 0.01
                });
            }

            // 粒子数据
            const particles = [];
            const PARTICLE_COUNT = 80;
            const colors = [
                { c: '#38bdf8', glow: 'rgba(56, 189, 248, 0.8)' },
                { c: '#fb923c', glow: 'rgba(251, 146, 60, 0.8)' },
                { c: '#f472b6', glow: 'rgba(244, 114, 182, 0.8)' },
                { c: '#a78bfa', glow: 'rgba(167, 139, 250, 0.8)' },
                { c: '#ffffff', glow: 'rgba(255, 255, 255, 0.5)' }
            ];

            function createParticle() {
                const color = colors[Math.floor(Math.random() * colors.length)];
                return {
                    startX: width * (0.2 + Math.random() * 0.6),
                    startY: height * (0.8 + Math.random() * 0.2),
                    x: 0, y: 0,
                    drift: (Math.random() - 0.5) * 120,
                    radius: Math.random() * 2 + 1,
                    color: color.c,
                    glow: color.glow,
                    progress: Math.random(),
                    speed: (Math.random() * 0.0025) + 0.0015
                };
            }

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(createParticle());
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);

                // 绘制星空
                ctx.shadowBlur = 0;
                stars.forEach(star => {
                    star.phase += star.speed;
                    const alpha = 0.2 + (Math.sin(star.phase) + 1) / 2 * 0.8;
                    const scale = 0.6 + (Math.sin(star.phase) + 1) / 2 * 0.6;
                    
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.baseRadius * scale, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fill();
                });

                // 绘制光轨粒子
                particles.forEach(p => {
                    p.progress += p.speed;
                    if (p.progress > 1) {
                        Object.assign(p, createParticle());
                        p.progress = 0;
                    }

                    p.x = p.startX + (p.drift * p.progress);
                    p.y = p.startY - (600 * p.progress);

                    const currentScale = 0.5 + (0.7 * p.progress);
                    let alpha = 1;
                    if (p.progress < 0.1) alpha = p.progress / 0.1;
                    else if (p.progress > 0.9) alpha = (1 - p.progress) / 0.1;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * currentScale, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = p.glow;
                    ctx.globalAlpha = alpha;
                    ctx.fill();
                });
                
                ctx.globalAlpha = 1;
                requestAnimationFrame(animate);
            }
            animate();

            // ==========================================
            // 2. 导航与日程 DOM 渲染
            // ==========================================
            const navTabs = document.getElementById('navTabs');
            scheduleData.forEach((day, index) => {
                const btn = document.createElement('button');
                btn.textContent = day.dayLabel;
                btn.dataset.day = index;
                if (index === 0) btn.classList.add('active');
                btn.addEventListener('click', function() {
                    switchDay(index);
                });
                navTabs.appendChild(btn);
            });

            const container = document.getElementById('scheduleContainer');

            function renderSchedule() {
                container.innerHTML = '';
                scheduleData.forEach((day, dayIndex) => {
                    const panel = document.createElement('div');
                    panel.className = 'day-panel' + (dayIndex === 0 ? ' active' : '');
                    panel.id = day.panelId;

                    day.venues.forEach(venue => {
                        const block = document.createElement('div');
                        block.className = 'venue-block';

                        const titleWrap = document.createElement('div');
                        titleWrap.className = 'venue-title-wrap';
                        const link = document.createElement('a');
                        link.href = venue.url;
                        link.target = '_blank';
                        link.rel = 'noopener noreferrer';
                        link.innerHTML = '📍 ' + venue.name + ' <span class="map-icon">🗺️</span>';
                        titleWrap.appendChild(link);
                        block.appendChild(titleWrap);

                        venue.sessions.forEach(session => {
                            const option = document.createElement('div');
                            option.className = 'session-option' + (session.fullDay ? ' full-day' : '');

                            const wrapper = document.createElement('div');
                            wrapper.className = 'session-wrapper';

                            const timeCol = document.createElement('div');
                            timeCol.className = 'session-time-column';
                            timeCol.textContent = session.time;
                            wrapper.appendChild(timeCol);

                            const speakerCol = document.createElement('div');
                            speakerCol.className = 'session-speaker-column';
                            if (session.speaker && session.speaker.includes('·')) {
                                const names = session.speaker.split('·').map(s => s.trim());
                                names.forEach((name, idx) => {
                                    const span = document.createElement('span');
                                    span.className = 'speaker-name';
                                    span.textContent = name;
                                    speakerCol.appendChild(span);
                                    if (idx < names.length - 1) {
                                        const sep = document.createElement('span');
                                        sep.className = 'speaker-sep';
                                        sep.textContent = ' · ';
                                        speakerCol.appendChild(sep);
                                    }
                                });
                            } else {
                                speakerCol.textContent = session.speaker || '—';
                            }
                            wrapper.appendChild(speakerCol);

                            const infoCol = document.createElement('div');
                            infoCol.className = 'session-info-column';

                            const nameDiv = document.createElement('div');
                            nameDiv.className = 'session-name';
                            nameDiv.textContent = session.cn;
                            infoCol.appendChild(nameDiv);

                            const enDiv = document.createElement('div');
                            enDiv.className = 'session-name-en';
                            enDiv.textContent = session.en;
                            infoCol.appendChild(enDiv);

                            wrapper.appendChild(infoCol);
                            option.appendChild(wrapper);
                            block.appendChild(option);
                        });

                        panel.appendChild(block);
                    });

                    container.appendChild(panel);
                });
            }
            renderSchedule();

            const panels = {};
            scheduleData.forEach((day, index) => {
                panels[index] = document.getElementById(day.panelId);
            });

            function switchDay(index) {
                const buttons = document.querySelectorAll('.nav-tabs button');
                buttons.forEach((btn, i) => {
                    btn.classList.toggle('active', i === index);
                });
                Object.keys(panels).forEach(key => {
                    panels[key].classList.toggle('active', parseInt(key) === index);
                });
            }
            window.switchDay = switchDay;
        })();
    </script>
